<div class="page">
  <div class="topbar">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-subtitle">Selamat datang, {{ user?.name }}</div>
    </div>
    <div class="topbar-actions">
      <span class="date-chip">📅 Maret 2026</span>
    </div>
  </div>

  <div class="page-body">
    <div class="stats-grid">
      <div class="stat-card" *ngFor="let stat of stats" [class]="stat.theme">
        <div class="stat-icon">{{ stat.icon }}</div>
        <div class="stat-value">{{ stat.value }}</div>
        <div class="stat-label">{{ stat.label }}</div>
        <div class="stat-trend">{{ stat.trend }}</div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Aktivitas Terbaru</span>
        </div>
        <div class="card-body">
          <div class="activity-item" *ngFor="let a of activities">
            <div class="dot" [class]="'dot-' + a.dot"></div>
            <div>
              <div class="act-text" [innerHTML]="a.text"></div>
              <div class="act-time">{{ a.time }}</div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Efisiensi Token</span>
        </div>
        <div class="card-body">
          <div class="bar-row">
            <div class="bar-label">
              <span>RLM Engine</span>
              <span class="bar-val accent">38%</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill rlm" style="width:38%"></div>
            </div>
          </div>
          <div class="bar-row">
            <div class="bar-label">
              <span>Konvensional</span>
              <span class="bar-val muted">100%</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill conv" style="width:100%"></div>
            </div>
          </div>
          <div class="saving-badge">
            <div class="saving-val">62%</div>
            <div class="saving-lbl">Penghematan token rata-rata</div>
          </div>
          <div class="acc-grid">
            <div class="acc-item">
              <div class="acc-val">94.2%</div>
              <div class="acc-lbl">Akurasi RLM</div>
            </div>
            <div class="acc-item">
              <div class="acc-val muted">78.5%</div>
              <div class="acc-lbl">Akurasi Konv.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
