<div class="page">
  <div class="topbar">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-subtitle">Selamat datang, {{ user?.name }}</div>
    </div>
    <div class="topbar-actions">
      <span class="date-chip">{{ today | date:'MMMM y' }}</span>
    </div>
  </div>

  <div class="page-body">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blue">📄</div>
        <div class="stat-value">{{ loading ? '...' : docCount }}</div>
        <div class="stat-label">Dokumen SOP</div>
        <div class="stat-trend">Total dokumen terupload</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon purple">💬</div>
        <div class="stat-value">{{ loading ? '...' : sessionCount }}</div>
        <div class="stat-label">Total Sesi Chat</div>
        <div class="stat-trend">{{ activeSessions }} sesi aktif</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Aktivitas Terbaru</span>
      </div>
      <div class="card-body">
        <div class="loading" *ngIf="loading">Memuat aktivitas...</div>
        <ng-container *ngIf="!loading">
          <div class="activity-item" *ngFor="let a of activities">
            <div class="dot" [class]="'dot-' + a.dot"></div>
            <div>
              <div class="act-text" [innerHTML]="a.text"></div>
              <div class="act-time">{{ a.time }}</div>
            </div>
          </div>
          <div class="empty-state" *ngIf="activities.length === 0">
            Belum ada aktivitas
          </div>
        </ng-container>
      </div>
    </div>
  </div>
</div>
