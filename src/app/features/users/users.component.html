<div class="page">
  <div class="topbar">
    <div>
      <div class="page-title">Manajemen User</div>
      <div class="page-subtitle">Kelola akun pengguna sistem</div>
    </div>
    <button class="btn-primary" (click)="showAddModal = true">+ Tambah User</button>
  </div>

  <div class="page-body">
    <div class="loading" *ngIf="loading">Memuat data user...</div>

    <div class="table-wrap" *ngIf="!loading">
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Email</th>
            <th>Role</th>
            <th>Login Terakhir</th>
            <th>Terdaftar</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of users">
            <td>
              <div class="user-cell">
                <div class="user-avatar">{{ getInitials(u.name) }}</div>
                {{ u.name }}
              </div>
            </td>
            <td class="muted">{{ u.email }}</td>
            <td>
              <span class="role-badge"
                    [class.role-admin]="u.role === 'ADMIN'"
                    [class.role-user]="u.role === 'USER'">
                {{ u.role }}
              </span>
            </td>
            <td class="muted">{{ u.last_login | date:'d MMM, HH:mm' }}</td>
            <td class="muted">{{ u.created_at | date:'d MMM y' }}</td>
            <td>
              <div class="row-actions">
                <button class="btn-ghost">✏️ Edit</button>
                <button class="btn-danger" (click)="delete(u.id)">🗑</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add User Modal -->
<div class="modal-overlay" *ngIf="showAddModal" (click)="showAddModal = false">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Tambah User Baru</span>
      <button class="close-btn" (click)="showAddModal = false">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nama</label>
      <input class="form-input" type="text"
             placeholder="Nama lengkap" [(ngModel)]="newUser.name">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email"
             placeholder="email@perusahaan.com" [(ngModel)]="newUser.email">
    </div>
    <div class="form-group">
      <label class="form-label">Role</label>
      <select class="form-input" [(ngModel)]="newUser.role">
        <option value="USER">User</option>
        <option value="ADMIN">Admin</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password"
             placeholder="Min. 6 karakter" [(ngModel)]="newUser.password">
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" (click)="showAddModal = false">Batal</button>
      <button class="btn-primary">Buat Akun</button>
    </div>
  </div>
</div>
