<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">🧠</div>
      <div class="auth-title">SOP Intellect</div>
      <div class="auth-subtitle">Chatbot SOP berbasis Recursive Language Model</div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab" [class.active]="activeTab === 'login'"
        (click)="activeTab = 'login'">Masuk</button>
      <button class="auth-tab" [class.active]="activeTab === 'register'"
        (click)="activeTab = 'register'">Daftar</button>
    </div>

    <div class="error-banner" *ngIf="error">⚠ {{ error }}</div>

    <!-- LOGIN -->
    <ng-container *ngIf="activeTab === 'login'">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email"
          placeholder="email@contoh.com" [(ngModel)]="loginData.email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password"
          placeholder="••••••••" [(ngModel)]="loginData.password">
      </div>
      <button class="btn-primary" [disabled]="loading" (click)="login()">
        {{ loading ? 'Memproses...' : 'Masuk ke Sistem' }}
      </button>
    </ng-container>

    <!-- REGISTER -->
    <ng-container *ngIf="activeTab === 'register'">
      <div class="form-group">
        <label class="form-label">Nama Lengkap</label>
        <input class="form-input" type="text"
          placeholder="Nama lengkap" [(ngModel)]="registerData.name">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email"
          placeholder="email@contoh.com" [(ngModel)]="registerData.email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password"
          placeholder="Min. 6 karakter" [(ngModel)]="registerData.password">
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-input" [(ngModel)]="registerData.role">
          <option value="USER">User</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
      <button class="btn-primary" [disabled]="loading" (click)="register()">
        {{ loading ? 'Memproses...' : 'Buat Akun' }}
      </button>
    </ng-container>

  </div>
</div>
