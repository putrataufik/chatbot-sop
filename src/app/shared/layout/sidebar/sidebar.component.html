<aside class="sidebar">

  <div class="sidebar-logo">
    <div class="logo-icon">🧠</div>
    <div>
      <div class="logo-text">SOP Intellect</div>
      <div class="logo-badge">RLM Engine</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a *ngFor="let item of navItems"
       [routerLink]="item.route"
       routerLinkActive="active"
       class="nav-item">
      <span class="nav-icon">{{ item.icon }}</span>
      {{ item.label }}
    </a>

    <div class="session-section">
      <div class="nav-section-label" *ngIf="isAdmin">Chat</div>
      <button class="btn-new-chat" (click)="onNewChat()">+ New Chat</button>
      <input class="session-search"
             type="text"
             placeholder="Cari sesi..."
             [(ngModel)]="sessionSearch">
      <div class="session-list">
        <div class="session-item"
             *ngFor="let s of filteredSessions"
             [class.active]="activeSessionId === s.id"
             (click)="onSelectSession(s)">
          <div class="session-title">{{ s.title }}</div>
        </div>
        <div class="session-empty" *ngIf="filteredSessions.length === 0">
          {{ sessionSearch ? 'Tidak ditemukan' : 'Belum ada sesi chat' }}
        </div>
      </div>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar">{{ getInitials(user?.name || 'U') }}</div>
      <div class="user-info">
        <div class="user-name">{{ user?.name }}</div>
        <div class="user-role">{{ user?.role }}</div>
      </div>
      <button class="logout-btn" (click)="logout()" title="Logout">↩</button>
    </div>
  </div>

</aside>
